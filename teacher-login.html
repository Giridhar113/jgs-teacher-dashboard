<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JGS Faculty Portal Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth-enhancements.js" defer></script>
</head>
<body class="login-page">
  <main class="login-card">
    <div class="brand-mark"><span class="brand-dot">JGS</span><span>JGS Group of Institutes</span></div>
    <h1>Faculty Portal Login</h1>
    <p>Faculty and HOD teaching workflows for AY 2025-26. AICTE Approved - Affiliated to University of Mumbai.</p>
    <form id="loginForm" class="form-grid">
      <div class="field">
        <label for="identity">Faculty ID / Mobile / Email</label>
        <input id="identity" autocomplete="username" required placeholder="FAC/CSE/042">
      </div>
      <div class="field">
        <label for="password">PIN / Password</label>
        <div class="password-row">
          <input id="password" type="password" autocomplete="current-password" required placeholder="Enter PIN or password">
          <button class="button" id="togglePassword" type="button">Show</button>
        </div>
      </div>
      <div class="actions">
        <button class="button" id="sendOtp" type="button">Send OTP</button>
        <button class="button primary" type="submit">Login</button>
      </div>
      <p id="loginStatus" class="muted" aria-live="polite"></p>
      <a class="button ghost" href="https://jgs.edu.in/">Back to JGS website</a>
    </form>
  </main>
  <script src="js/config.js"></script>
  <script src="js/auth-client.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
